services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: dogs
      POSTGRES_PASSWORD: dogs
      POSTGRES_DB: dogs_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dogs -d dogs_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    env_file:
      - backend/.env
    environment:
      DATABASE_URL: postgresql+psycopg://dogs:dogs@db:5432/dogs_db
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - /app/.venv
      - ./scraping:/scraping:ro
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    build: ./frontend
    ports:
      - "5173:5173"
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules
    command: npm run dev -- --host 0.0.0.0

volumes:
  pgdata:
